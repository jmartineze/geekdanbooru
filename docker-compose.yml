services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: danbooru-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "9003:9000"
    depends_on:
      - db
    networks:
      - danbooru

  web:
    image: nginx:alpine
    container_name: danbooru-web
    ports:
      - "8086:80"
    volumes:
      - ./:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - danbooru

  db:
    image: mariadb:11.4
    container_name: danbooru-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: danbooru
      MYSQL_USER: danbooru
      MYSQL_PASSWORD: danbooru
    volumes:
      - danbooru_db_data:/var/lib/mysql
    ports:
      - "3312:3306"
    networks:
      - danbooru

  composer:
    image: composer:2
    container_name: danbooru-composer
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - danbooru

networks:
  danbooru:

volumes:
  danbooru_db_data:
